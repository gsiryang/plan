<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071d3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="今日计划">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>今日计划 PWA</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="stylesheet" href="/styles.css?v=13">
  <script defer src="/pwa.js?v=13"></script>
</head>
<body class="mobile-page pwa-page">
  <main class="phone-shell app-shell">
    <header class="mobile-hero compact-hero">
      <p class="eyebrow">Offline First</p>
      <h1>今日计划</h1>
      <p id="systemTime">正在读取系统时间...</p>
    </header>

    <section class="app-view active" data-view="today">
      <section class="mobile-card">
        <div class="section-title compact"><h2>今日</h2></div>
        <div class="sub-tabs today-tabs" aria-label="今日分类">
          <button type="button" class="active" data-today-tab="plan">今日计划</button>
          <button type="button" data-today-tab="errands">今日杂事</button>
        </div>

        <div class="today-pane active" data-today-pane="plan">
          <form id="pwaForm" class="pane-form">
            <label>日期<input id="entryDate" type="date"></label>
            <p id="recordedAt" class="meta-line"></p>
            <label>本周焦点<input id="weekFocus" placeholder="这周主要推进什么？"></label>
            <label>今天最重要的一件事<input id="topOne" placeholder="只写一件"></label>

            <div class="mobile-toggles">
              <label><input id="workDone" type="checkbox"><span>工作稳定</span></label>
              <label><input id="skillDone" type="checkbox"><span>技能成长</span></label>
              <label><input id="careerDone" type="checkbox"><span>职业准备</span></label>
              <label><input id="wellbeingDone" type="checkbox"><span>能量维护</span></label>
            </div>

            <label>一句复盘<textarea id="reflection" rows="4" placeholder="今天最值得记的一句话"></textarea></label>
            <button id="savePlan" type="button">保存今日计划</button>
            <p id="saveState" class="save-state"></p>
          </form>

          <div class="section-title compact"><h2>今日计划参考</h2></div>
          <div id="todayPlan" class="suggestions"></div>
        </div>

        <div class="today-pane" data-today-pane="errands">
          <div class="add-task-row">
            <input id="errandText" placeholder="新增杂事，例如：交水费、取快递、回消息">
            <button id="addErrand" type="button">添加</button>
          </div>
          <div id="todayErrands" class="plan-stack"></div>
        </div>
      </section>
    </section>

    <section class="app-view" data-view="mood">
      <section class="mobile-card">
        <div class="section-title compact"><h2>心情记录</h2></div>
        <label>日期<input id="moodEntryDate" type="date"></label>
        <label>记录时间<input id="moodTime" type="time"></label>
        <label>心情程度<select id="moodScore"></select></label>
        <label>心情文字<textarea id="moodNote" rows="6" placeholder="今天为什么是这个分数？"></textarea></label>
        <button id="saveMood" type="button">保存心情</button>
        <p id="moodState" class="save-state"></p>
        <div id="moodLog" class="mood-log"></div>
      </section>
    </section>

    <section class="app-view" data-view="plan">
      <section class="mobile-card">
        <div class="section-title compact"><h2>计划参考</h2></div>
        <div class="plan-cycle-box">
          <label>当前周期<select id="activePlanSelect"></select></label>
          <label class="file-button plan-import-button">
            导入周期 JSON
            <input id="importPlanFile" type="file" accept="application/json">
          </label>
          <p id="planState" class="save-state"></p>
        </div>
        <div class="sub-tabs" aria-label="计划参考分类">
          <button type="button" class="active" data-plan-tab="month">当月</button>
          <button type="button" data-plan-tab="week">当周</button>
          <button type="button" data-plan-tab="prompts">提示</button>
          <button type="button" data-plan-tab="custom">自定义</button>
        </div>
        <div class="plan-pane active" data-plan-pane="month">
          <label>查看月份<select id="monthPlanSelect"></select></label>
          <div id="monthPlan" class="plan-stack"></div>
        </div>
        <div class="plan-pane" data-plan-pane="week">
          <div id="weekPlan" class="plan-stack"></div>
        </div>
        <div class="plan-pane" data-plan-pane="prompts">
          <div id="promptList" class="prompt-grid"></div>
        </div>
        <div class="plan-pane" data-plan-pane="custom">
          <div class="add-task-row">
            <input id="customTaskText" placeholder="新增一个任务提示，例如：今天联系 1 位前同事">
            <button id="addCustomTask" type="button">添加</button>
          </div>
          <div id="customTasks" class="plan-stack"></div>
        </div>
      </section>
    </section>

    <section class="app-view" data-view="health">
      <section class="mobile-card">
        <div class="section-title compact"><h2>体重记录</h2></div>
        <div class="two-col">
          <label>体重 kg<input id="weightKg" type="number" inputmode="decimal" step="0.1" placeholder="例如 58.5"></label>
          <label>腰围 cm<input id="waistCm" type="number" inputmode="decimal" step="0.1" placeholder="可选"></label>
        </div>
        <label>体脂率 %<input id="bodyFat" type="number" inputmode="decimal" step="0.1" placeholder="可选"></label>
        <label class="inline-check"><input id="bingeEating" type="checkbox"> 今天有暴食/失控进食</label>
        <button id="saveWeight" type="button">保存体重记录</button>
      </section>

      <section class="mobile-card">
        <div class="section-title compact"><h2>运动记录</h2></div>
        <div class="two-col">
          <label>运动时长 分钟<input id="exerciseMinutes" type="number" inputmode="numeric" min="0" step="5" placeholder="例如 45"></label>
          <label>运动类型
            <select id="exerciseType">
              <option value="">未记录</option>
              <option value="cardio">有氧</option>
              <option value="class">健身团课</option>
              <option value="strength">无氧</option>
            </select>
          </label>
        </div>
        <button id="saveExercise" type="button">保存运动记录</button>
      </section>

      <section class="mobile-card">
        <div class="section-title compact"><h2>月经与周期</h2></div>
        <label class="inline-check"><input id="periodStart" type="checkbox"> 今天是月经来临第一天</label>
        <label class="inline-check"><input id="periodEnd" type="checkbox"> 今天月经结束</label>
        <div class="two-col">
          <label>平均周期<input id="cycleLength" type="number" inputmode="numeric" min="18" max="45" placeholder="28"></label>
          <label>默认经期天数<input id="periodLength" type="number" inputmode="numeric" min="2" max="10" placeholder="7"></label>
        </div>
        <button id="saveCycle" type="button">保存周期记录</button>
        <div id="cycleSummary" class="summary-box"></div>
        <div id="fitnessAdvice" class="advice-box"></div>
        <p id="healthState" class="save-state"></p>
      </section>
    </section>

    <section class="app-view" data-view="trend">
      <section class="mobile-card">
        <div class="section-title compact"><h2>月度趋势</h2></div>
        <label>查看月份<input id="chartMonth" type="month"></label>
        <div class="chart-controls">
          <label><input id="showCompletion" type="checkbox" checked> 计划</label>
          <label><input id="showMood" type="checkbox" checked> 心情</label>
          <label><input id="showWeight" type="checkbox" checked> 体重</label>
          <label><input id="showExercise" type="checkbox" checked> 运动</label>
          <label><input id="showCycle" type="checkbox" checked> 周期背景</label>
          <label><input id="showBinge" type="checkbox" checked> 暴食点</label>
        </div>
        <div class="chart-wrap"><canvas id="trendChart" width="720" height="420"></canvas></div>
        <div class="chart-legend">
          <span class="legend completion">计划完成度</span>
          <span class="legend mood">心情</span>
          <span class="legend weight">体重</span>
          <span class="legend exercise">运动时长</span>
          <span class="legend period">周期背景</span>
          <span class="legend binge">暴食事件</span>
        </div>
      </section>
      <section class="mobile-card">
        <div class="section-title compact"><h2>备份</h2></div>
        <div class="section-title compact"><h2>日内心情曲线</h2></div>
        <div id="dayMoodDays" class="mood-day-list"></div>
        <div class="chart-wrap"><canvas id="dayMoodChart" width="720" height="360"></canvas></div>
        <div class="backup-actions">
          <button id="exportButton" type="button">导出备份</button>
          <a id="downloadBackup" class="download-button" href="#" download="personal-plan-backup.json" aria-disabled="true">下载 JSON</a>
          <label class="file-button">导入备份<input id="importFile" type="file" accept="application/json"></label>
        </div>
        <textarea id="backupText" rows="6" readonly placeholder="导出的备份会显示在这里，可以复制到备忘录或网盘。"></textarea>
      </section>

      <section class="mobile-card install-note">
        <h2>添加到主屏幕</h2>
        <p>在 iPhone Safari 打开 HTTPS 地址后，点分享按钮，选择“添加到主屏幕”。iOS 16.6.1 支持这种方式。</p>
      </section>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="底部导航">
    <button type="button" class="active" data-target="today">今日</button>
    <button type="button" data-target="mood">心情</button>
    <button type="button" data-target="plan">计划</button>
    <button type="button" data-target="health">健康</button>
    <button type="button" data-target="trend">趋势/备份</button>
  </nav>
</body>
</html>
